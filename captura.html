<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peakadex Summit Capture</title>
    <style>
        :root {
            --bg-color: #0D1B2A;
            --peak-dark: #1B263B;
            --peak-mid: #415A77;
            --peak-light: #E0E1DD;
            --accent-red: #FF3B1A;
            --stroke-color: #051923;
            --bezier: cubic-bezier(0.65, 0, 0.35, 1);
            --snap-bezier: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 300px;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- SVG Logo Styles --- */
        .logo-svg {
            width: 200px;
            height: 200px;
            overflow: visible;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        .logo-frame, .logo-mountain {
            opacity: 0;
            transition: opacity 1.2s var(--bezier);
        }

        .logo-frame {
            fill: none;
            stroke: var(--stroke-color);
            stroke-width: 8;
        }

        /* --- Animated Capture Dot --- */
        #capture-dot {
            position: absolute;
            width: 22px;
            height: 22px;
            background: var(--accent-red);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-red);
            z-index: 10;
            pointer-events: none;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 50%;
            opacity: 0;
        }

        /* --- UI Elements --- */
        .status-text {
            margin-top: 30px;
            color: var(--peak-light);
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.8s var(--bezier);
        }

        .card {
            position: absolute;
            bottom: -150px;
            width: 260px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            color: white;
            text-align: center;
            opacity: 0;
            transition: all 1s var(--snap-bezier);
        }

        /* --- Animation states triggerable via JS --- */
        .reveal-logo { opacity: 0.15; }
        .full-reveal { opacity: 1; }
        .burst {
            animation: ripple 0.6s ease-out;
        }

        @keyframes ripple {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 26, 0.7); }
            100% { transform: scale(1.1); box-shadow: 0 0 0 40px rgba(255, 59, 26, 0); }
        }

        @keyframes mountain-pop {
            0% { transform: scale(0.95); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <svg class="logo-svg" viewBox="0 0 200 200">
            <path id="logoFrame" class="logo-frame" 
                  d="M 100,20 A 80,80 0 1,1 99.9,20" 
                  stroke-dasharray="500" stroke-dashoffset="0"/>
            
            <g id="mountain" class="logo-mountain">
                <path fill="#415A77" d="M100 45l-70 110h60l10-25 10 25h60z" /> <path fill="#1B263B" d="M100 45l70 110h-70l-10-25z" /> <path fill="#E0E1DD" d="M100 45l-22 35 12 8 10-5 10 5 12-8z" /> </g>
        </svg>

        <div id="capture-dot"></div>

        <div id="status" class="status-text">Cima Capturada</div>

        <div id="captureCard" class="card">
            <h3 style="margin: 0 0 5px 0">Monte Everest</h3>
            <p style="margin: 0; font-size: 0.8rem; opacity: 0.7;">8.848m • Himalaya</p>
        </div>
    </div>

    <script>
        function playCaptureAnimation() {
            const dot = document.getElementById('capture-dot');
            const frame = document.getElementById('logoFrame');
            const mountain = document.getElementById('mountain');
            const status = document.getElementById('status');
            const card = document.getElementById('captureCard');
            const svg = document.querySelector('.logo-svg');

            // 1. Initial State
            dot.style.opacity = '1';
            
            // 2. Orbiting Path (Simulated dynamic movement)
            let start = null;
            const duration = 2500; // Total travel time

            function step(timestamp) {
                if (!start) start = timestamp;
                let progress = (timestamp - start) / duration;
                
                if (progress < 1) {
                    // Curved path logic: spiral into position
                    const angle = progress * Math.PI * 4; // 2 full rotations
                    const radius = 120 * (1 - progress);
                    
                    // Center point is approx middle of screen
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius - (progress * 50);

                    dot.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
                    
                    // Reveal mountain outline mid-way
                    if (progress > 0.4) {
                        frame.classList.add('reveal-logo');
                        mountain.classList.add('reveal-logo');
                    }

                    requestAnimationFrame(step);
                } else {
                    // 3. Final Snap
                    lockPosition();
                }
            }

            function lockPosition() {
                // Precise target: Top center of the SVG frame
                dot.style.transition = "all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)";
                dot.style.left = "50%";
                dot.style.top = "calc(50% - 80px)"; // Aligned with SVG top
                dot.style.transform = "translate(-50%, -50%) scale(1.1)";

                setTimeout(() => {
                    // Visual feedback on lock
                    dot.classList.add('burst');
                    frame.classList.remove('reveal-logo');
                    mountain.classList.remove('reveal-logo');
                    frame.classList.add('full-reveal');
                    mountain.classList.add('full-reveal');
                    
                    // Scale bounce effect on whole logo
                    svg.style.transition = "transform 0.4s var(--snap-bezier)";
                    svg.style.transform = "scale(1.05)";
                    
                    setTimeout(() => {
                        svg.style.transform = "scale(1)";
                        // Fade in text
                        status.style.opacity = "1";
                        status.style.transform = "translateY(0)";
                        
                        // Show the card
                        setTimeout(showCard, 600);
                    }, 200);
                }, 500);
            }

            function showCard() {
                card.style.opacity = "1";
                card.style.bottom = "20px";
            }

            requestAnimationFrame(step);
        }

        // Run on load
        window.addEventListener('load', () => {
            setTimeout(playCaptureAnimation, 500);
        });
    </script>
</body>
</html>
