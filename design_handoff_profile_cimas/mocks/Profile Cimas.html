<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Peakadex · Perfil — Rediseño Cimas</title>

<!-- Google Fonts matching Peakadex stack -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --font-inter: 'Inter', ui-sans-serif, system-ui, sans-serif;
    --font-manrope: 'Manrope', sans-serif;
    --font-space: 'Space Grotesk', sans-serif;
    --font-mono-landing: 'JetBrains Mono', ui-monospace, monospace;
    /* Peakadex tokens */
    --pc-dark: #0D2538;
    --pc-orange: #FF5D2D;
    --ld-accent: #2F7A5F;
    --ld-accent-hover: #3FA37A;
    --ld-muted: #5A6E84;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: var(--font-inter);
    color: var(--pc-dark);
    background: #f0eee9;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button { font-family: inherit; }
  input { font-family: inherit; }

  /* Phone status bar (mobile artboards) */
  .phone-statusbar {
    display: flex; align-items: center; justify-content: space-between;
    height: 22px; padding: 0 16px;
    background: white;
    font-family: var(--font-inter);
    font-size: 11px; font-weight: 700;
    color: #0D2538;
    border-bottom: 1px solid #f1f5f9;
  }
  .phone-statusbar .right { display: flex; gap: 5px; align-items: center; }
  .phone-statusbar .dot { width: 4px; height: 4px; border-radius: 999px; background: #0D2538; }
  .phone-statusbar .battery {
    display: inline-block; width: 18px; height: 9px;
    border: 1px solid #0D2538; border-radius: 2px; position: relative;
  }
  .phone-statusbar .battery::after {
    content: ""; position: absolute; right: -3px; top: 2px;
    width: 2px; height: 5px; background: #0D2538; border-radius: 0 1px 1px 0;
  }
  .phone-statusbar .battery::before {
    content: ""; position: absolute; left: 1px; top: 1px; bottom: 1px; width: 70%;
    background: #0D2538; border-radius: 1px;
  }

  /* Top-of-app mini nav (desktop artboards) */
  .desktop-topnav {
    background: white;
    border-bottom: 1px solid #e5e7eb;
    height: 56px;
    display: flex; align-items: center; padding: 0 24px;
    gap: 28px;
  }
  .desktop-topnav .logo-wrap {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-manrope); font-weight: 800;
    font-size: 18px; letter-spacing: -0.02em;
  }
  .desktop-topnav .logo-wrap .peak { color: #0D2538; }
  .desktop-topnav .logo-wrap .adex { color: #4E6178; }
  .desktop-topnav .logo-mark {
    width: 22px; height: 22px; border-radius: 999px;
    border: 2px solid #2F7A5F;
    display: inline-flex; align-items: center; justify-content: center;
    background: white; flex-shrink: 0;
  }
  .desktop-topnav .navlinks {
    display: flex; gap: 22px; margin-left: 16px;
    font-size: 13px; font-weight: 500; color: #5A6E84;
  }
  .desktop-topnav .navlinks .active { color: #0D2538; font-weight: 700; }

  .desktop-frame-bg {
    background: #f4f5f7;
    min-height: 100%;
  }

  /* Headline + section copy on canvas */
  .canvas-caption {
    color: rgba(40,30,20,.75);
    font-family: var(--font-inter);
    line-height: 1.5;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="profile-data.jsx"></script>
<script type="text/babel" src="profile-shared.jsx"></script>
<script type="text/babel" src="profile-variant-a.jsx"></script>
<script type="text/babel" src="profile-variant-b.jsx"></script>
<script type="text/babel" src="profile-variant-c.jsx"></script>
<script type="text/babel" src="profile-foto.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "cozy",
  "showHeader": true,
  "sampleTagged": "foto"
}/*EDITMODE-END*/;

// ─────────────────────────────────────────────────────────────────
// Profile shell — wraps a tab's content with the appropriate chrome
// ─────────────────────────────────────────────────────────────────
function ProfileShell({ children, viewport = "mobile", activeTab = "cimas", variantLabel }) {
  if (viewport === "mobile") {
    return (
      <div style={{
        width: "100%", height: "100%", overflow: "auto",
        background: "white",
      }}>
        <div className="phone-statusbar">
          <span>9:41</span>
          <div className="right">
            <span style={{ fontSize: 10 }}>●●●</span>
            <span style={{ fontSize: 10 }}>WiFi</span>
            <span className="battery" />
          </div>
        </div>
        <ProfileHeader activeTab={activeTab} variantLabel={variantLabel} compact />
        <div style={{ background: "#F4F7FA" }}>{children}</div>
      </div>
    );
  }

  // Desktop — mimic the live app with topnav and 640px-max-width content
  return (
    <div style={{
      width: "100%", height: "100%", overflow: "auto",
      background: "#F4F7FA",
    }}>
      <div className="desktop-topnav">
        <div className="logo-wrap">
          <span className="peak">peak</span>
          <span className="logo-mark">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M3 19l5-9 4 5 4-8 5 12z" stroke="#2F7A5F" strokeWidth="2.2" strokeLinejoin="round" fill="rgba(47,122,95,0.15)" />
            </svg>
          </span>
          <span className="adex">adex</span>
        </div>
        <div className="navlinks">
          <span>Mi Progreso</span>
          <span>Atlas</span>
          <span>Bitácora</span>
          <span>Social</span>
          <span className="active">Perfil</span>
        </div>
      </div>
      <div style={{
        maxWidth: 640, margin: "0 auto",
        background: "white",
        minHeight: "calc(100% - 56px)",
      }}>
        <ProfileHeader activeTab={activeTab} variantLabel={variantLabel} />
        <div style={{ background: "#F4F7FA" }}>{children}</div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// App — design canvas with 3 variants × 2 viewports + Foto/Etiquetado
// ─────────────────────────────────────────────────────────────────

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const sharedProps = {
    peaks: PEAKS_DATA,
    density: tweaks.density,
    showDistribution: tweaks.showHeader,
  };

  return (
    <React.Fragment>
      <DesignCanvas>

        {/* ─────────── Variante A ─────────── */}
        <DCSection id="variant-a"
          title="Variante A — Catálogo coleccionista"
          subtitle="Distribución por rareza arriba, filtros chip y filas densas con flor, altitud tintada y ×N con fecha.">
          <DCArtboard id="a-mobile" label="Móvil · 390" width={390} height={1180}>
            <ProfileShell viewport="mobile" activeTab="cimas" variantLabel="A · Catálogo">
              <VariantA {...sharedProps} />
            </ProfileShell>
          </DCArtboard>
          <DCArtboard id="a-desktop" label="Desktop · 760" width={760} height={1180}>
            <ProfileShell viewport="desktop" activeTab="cimas" variantLabel="A · Catálogo">
              <VariantA {...sharedProps} />
            </ProfileShell>
          </DCArtboard>
        </DCSection>

        {/* ─────────── Variante B ─────────── */}
        <DCSection id="variant-b"
          title="Variante B — Pasaporte alpino"
          subtitle="Editorial: numeración #001, sello ×N estilo tampón y datos monoespaciados. Rarezas como segmented control.">
          <DCArtboard id="b-mobile" label="Móvil · 390" width={390} height={1180}>
            <ProfileShell viewport="mobile" activeTab="cimas" variantLabel="B · Pasaporte">
              <VariantB {...sharedProps} />
            </ProfileShell>
          </DCArtboard>
          <DCArtboard id="b-desktop" label="Desktop · 760" width={760} height={1180}>
            <ProfileShell viewport="desktop" activeTab="cimas" variantLabel="B · Pasaporte">
              <VariantB {...sharedProps} />
            </ProfileShell>
          </DCArtboard>
        </DCSection>

        {/* ─────────── Variante C ─────────── */}
        <DCSection id="variant-c"
          title="Variante C — Galería de trofeos"
          subtitle="Strip de colección + carrusel de 4 trofeos, panel de filtros expandible y cartas horizontales con franja de rareza + pila de capturas.">
          <DCArtboard id="c-mobile" label="Móvil · 390" width={390} height={1180}>
            <ProfileShell viewport="mobile" activeTab="cimas" variantLabel="C · Trofeos">
              <VariantC {...sharedProps} />
            </ProfileShell>
          </DCArtboard>
          <DCArtboard id="c-desktop" label="Desktop · 760" width={760} height={1180}>
            <ProfileShell viewport="desktop" activeTab="cimas" variantLabel="C · Trofeos">
              <VariantC {...sharedProps} />
            </ProfileShell>
          </DCArtboard>
          <DCArtboard id="c-filters" label="Móvil · Filtros abiertos" width={390} height={1180}>
            <ProfileShell viewport="mobile" activeTab="cimas" variantLabel="C · Filtros">
              <VariantC
                {...sharedProps}
                initialFiltersOpen
                initialFilters={{ tier: "tundra", range: "Pirineos", sort: "count_desc" }}
              />
            </ProfileShell>
          </DCArtboard>
        </DCSection>

        {/* ─────────── Foto + Etiquetado ─────────── */}
        <DCSection id="photos"
          title="Tabs Foto y Etiquetado — actualizados"
          subtitle="Mismos filtros del tab Cimas para coherencia + overlay coleccionista en cada miniatura + badge de quién te etiquetó.">
          <DCArtboard id="foto-mobile" label="Foto · móvil" width={390} height={1180}>
            <ProfileShell viewport="mobile" activeTab="foto" variantLabel="Foto">
              <PhotoGrid photos={PHOTOS_DATA} />
            </ProfileShell>
          </DCArtboard>
          <DCArtboard id="tag-mobile" label="Etiquetado · móvil" width={390} height={1180}>
            <ProfileShell viewport="mobile" activeTab="tag" variantLabel="Etiquetado">
              <PhotoGrid photos={TAGGED_DATA} isTagged />
            </ProfileShell>
          </DCArtboard>
          <DCArtboard id="foto-desktop" label="Foto · desktop" width={760} height={1180}>
            <ProfileShell viewport="desktop" activeTab="foto" variantLabel="Foto">
              <PhotoGrid photos={PHOTOS_DATA} />
            </ProfileShell>
          </DCArtboard>
        </DCSection>

      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Densidad de fila" subtitle="Aplica a las 3 variantes">
          <TweakRadio
            value={tweaks.density}
            onChange={(v) => setTweak('density', v)}
            options={[
              { value: 'compact', label: 'Densa' },
              { value: 'medium', label: 'Media' },
              { value: 'cozy', label: 'Cómoda' },
            ]}
          />
        </TweakSection>
        <TweakSection title="Cabecera coleccionista" subtitle="Muestra resumen + distribución por rareza arriba">
          <TweakToggle
            value={tweaks.showHeader}
            onChange={(v) => setTweak('showHeader', v)}
            label="Resumen visible"
          />
        </TweakSection>
      </TweaksPanel>
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
