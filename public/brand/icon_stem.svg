<svg width="44" height="48" viewBox="0 0 44 48" xmlns="http://www.w3.org/2000/svg">

  <!--
    Two-face mountain + flower mark.
    Left face in shadow, right face lit — flat colors, no gradients,
    so the mark reads cleanly at any size from favicon to billboard.
  -->

  <!-- Mountain — left face (shadow) -->
  <path d="M1 48 L14 24 L17.5 21 L22 5 L22 48 Z"
        fill="#1e3f62"/>

  <!-- Mountain — right face (lit) -->
  <path d="M22 5 L35 19 L43 48 L22 48 Z"
        fill="#4a87b5"/>

  <!-- Snow cap — organic, slightly asymmetric -->
  <path d="M19.5 13.5 L22 5 L24.5 13 L23.5 17 L20.5 16 Z"
        fill="#eef6fb"/>

  <!-- Ridge detail — right face arête, subtle -->
  <path d="M22 5 L30.5 15"
        fill="none" stroke="#3a7099" stroke-width="0.8"
        stroke-linecap="round" opacity="0.7"/>

  <!-- Flower — centered at peak, in front of mountain -->
  <g transform="translate(22,19) scale(0.74) translate(-15,-15)">

    <!-- Petals — flat fill only, no stroke noise -->
    <path d="M15 3 Q20.5 9 15 15 Q9.5 9 15 3Z"          fill="#DC2626"/>
    <path d="M26.4 11.3 Q22.4 18.4 15 15 Q19 7.9 26.4 11.3Z" fill="#DC2626"/>
    <path d="M22.1 24.7 Q14.1 23.1 15 15 Q23 16.6 22.1 24.7Z" fill="#DC2626"/>
    <path d="M7.9 24.7 Q7 16.6 15 15 Q15.9 23.1 7.9 24.7Z"   fill="#DC2626"/>
    <path d="M3.6 11.3 Q11 7.9 15 15 Q7.6 18.4 3.6 11.3Z"    fill="#DC2626"/>

    <!-- Petal depth — inner shadow on each petal via darker half overlay -->
    <path d="M15 3 Q20.5 9 15 15 Q9.5 9 15 3Z"          fill="#991b1b" opacity="0.18"/>
    <path d="M26.4 11.3 Q22.4 18.4 15 15 Q19 7.9 26.4 11.3Z" fill="#991b1b" opacity="0.12"/>
    <path d="M22.1 24.7 Q14.1 23.1 15 15 Q23 16.6 22.1 24.7Z" fill="#991b1b" opacity="0.18"/>
    <path d="M7.9 24.7 Q7 16.6 15 15 Q15.9 23.1 7.9 24.7Z"   fill="#991b1b" opacity="0.18"/>
    <path d="M3.6 11.3 Q11 7.9 15 15 Q7.6 18.4 3.6 11.3Z"    fill="#991b1b" opacity="0.12"/>

    <!-- Petal shine — top-left light catch -->
    <path d="M15 4.5 Q17.5 8 16 12 Q14 12 13 8 Q12 5.5 15 4.5Z"
          fill="white" opacity="0.28"/>

    <!-- Center ring -->
    <circle cx="15" cy="15" r="4.5" fill="white"/>
    <circle cx="15" cy="15" r="4.5" fill="none" stroke="#fca5a5" stroke-width="0.6" opacity="0.6"/>
    <!-- Center dot -->
    <circle cx="15" cy="15" r="1.8" fill="#fecaca"/>

  </g>

</svg>
