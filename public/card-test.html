<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Card Back Face Test</title>
<style>
  body { margin: 0; background: #F4F7FA; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  /* ── Scene / flipper ── */
  .scene { width: 240px; height: 410px; perspective: 1200px; }
  .flipper {
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.6s;
    transform: rotateY(180deg); /* showing back face */
  }

  /* ── Back face ── */
  .back {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transform: rotateY(180deg);
    border-radius: 18px;
    background: #FFFFFF;
    box-shadow: 0 8px 32px rgba(13,37,56,0.14);
    display: flex;
    flex-direction: column;
    /* clip-path works inside preserve-3d; overflow:hidden does not */
    clip-path: inset(0px round 18px);
    -webkit-clip-path: inset(0px round 18px);
  }

  /* ── Map area ── */
  .map-area {
    position: relative;
    height: 238px;
    flex-shrink: 0;
  }
  .map-area img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .map-gradient {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.18) 55%, transparent 100%);
  }
  .map-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 0 14px 12px;
    font-family: sans-serif;
  }
  .coords { font-size: 9px; color: rgba(255,255,255,0.55); margin-bottom: 5px; }
  .coords .pin { color: #ef4444; font-size: 10px; }
  .peak-name { font-size: 22px; font-weight: 800; color: #fff; line-height: 1.1; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
  .peak-alt  { font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.92); margin-top: 2px; }
  .peak-range { font-size: 10px; color: rgba(255,255,255,0.50); margin-top: 2px; }
  .alt-bar-wrap { margin-top: 10px; }
  .alt-bar-track { height: 4px; background: rgba(255,255,255,0.18); border-radius: 3px; overflow: hidden; }
  .alt-bar-fill  { height: 100%; width: 38.5%; background: linear-gradient(to right, #a855f799, #a855f7); border-radius: 3px; }
  .alt-bar-labels { display: flex; justify-content: space-between; margin-top: 4px; font-size: 8px; color: rgba(255,255,255,0.40); }

  /* ── Stats panel ── */
  .stats {
    flex: 1; display: flex; flex-direction: column; justify-content: space-between;
    font-family: sans-serif;
  }
  .eyebrow {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px 0;
  }
  .eyebrow-dot { width: 7px; height: 7px; border-radius: 50%; background: #a855f7; flex-shrink: 0; }
  .eyebrow-label { font-size: 8px; font-weight: 700; letter-spacing: 0.10em; color: rgba(13,37,56,0.38); text-transform: uppercase; }
  .kpis {
    display: flex;
    border-top: 1px solid rgba(13,37,56,0.07);
    border-bottom: 1px solid rgba(13,37,56,0.07);
    margin: 8px 0 0;
  }
  .kpi { flex: 1; padding: 10px 14px; }
  .kpi.right { text-align: right; }
  .kpi-divider { width: 1px; background: rgba(13,37,56,0.07); margin: 10px 0; }
  .kpi-label { font-size: 8px; font-weight: 700; letter-spacing: 0.07em; color: rgba(13,37,56,0.35); text-transform: uppercase; margin-bottom: 4px; }
  .kpi-val { font-size: 22px; font-weight: 800; color: #0D2538; line-height: 1; }
  .message-area { padding: 9px 14px 14px; flex: 1; }
  .message-user { margin: 0; font-size: 12px; font-weight: 700; color: #111827; line-height: 1.3; }
  .message-text { margin: 4px 0 0; font-size: 10.5px; color: #6B7280; line-height: 1.55;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
</style>
</head>
<body>
  <div class="scene">
    <div class="flipper">
      <div class="back">
        <div class="map-area">
          <img src="/images/landing-taschhorn-map.webp" alt="">
          <div class="map-gradient"></div>
          <div class="map-overlay">
            <div class="coords"><span class="pin">📍</span> 46.0834°N · 7.8572°E</div>
            <div class="peak-name">Täschhorn</div>
            <div class="peak-alt">4.490 m</div>
            <div class="peak-range">Alpes Peninos</div>
            <div class="alt-bar-wrap">
              <div class="alt-bar-track"><div class="alt-bar-fill"></div></div>
              <div class="alt-bar-labels"><span>0 m</span><span>8.849 m</span></div>
            </div>
          </div>
        </div>
        <div class="stats">
          <div class="eyebrow">
            <div class="eyebrow-dot"></div>
            <span class="eyebrow-label">Estadísticas Peakadex</span>
          </div>
          <div class="kpis">
            <div class="kpi">
              <div class="kpi-label">Ascensiones</div>
              <div class="kpi-val">1</div>
            </div>
            <div class="kpi-divider"></div>
            <div class="kpi right">
              <div class="kpi-label">Alpinistas</div>
              <div class="kpi-val">1</div>
            </div>
          </div>
          <div class="message-area">
            <p class="message-user">Clara de Miguel</p>
            <p class="message-text">Una experiencia increíble en los Alpes suizos. La vista desde la cima es inigualable.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
