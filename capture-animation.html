<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Peakadex — Capture Reveal</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --dark: #0D2538;
  --text: #111827;
  --muted: #6B7280;
  --canvas: #F3F6FA;
  --orange: #FF5D2D;

  --daisy: #00995C;
  --daisy-soft: #E6F4EF;

  --gentian: #7B5BA6;
  --gentian-soft: #F2ECFA;

  --edelweiss: #F97316;
  --edelweiss-soft: #FFF0E8;

  --saxifrage: #EAB308;
  --saxifrage-soft: #FFF8DB;
}

body {
  min-height: 100vh;
  background: var(--canvas);
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* DEMO */

.demo {
  width: 100%;
  max-width: 390px;
  text-align: center;
}

.demo-card {
  background: white;
  border-radius: 28px;
  padding: 10px;
  border: 3px solid rgba(123,91,166,.4);
  box-shadow: 0 20px 50px rgba(123,91,166,.18);
  margin-bottom: 22px;
}

.demo-image {
  height: 460px;
  border-radius: 22px;
  background:
    linear-gradient(to top, rgba(7,18,31,.82), transparent 58%),
    url("https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=900&q=85") center/cover;
  display: flex;
  align-items: end;
  padding: 18px;
}

.demo-image h1 {
  color: white;
  font-size: 30px;
  line-height: .96;
  letter-spacing: -.045em;
  text-align: left;
}

.demo-button {
  border: 0;
  border-radius: 999px;
  padding: 15px 22px;
  background: var(--dark);
  color: white;
  font-size: 15px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 16px 34px rgba(13,37,56,.22);
}

/* OVERLAY */

.capture-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: none;
  place-items: center;
  padding: 20px;
  background:
    radial-gradient(circle at 50% 30%, rgba(123,91,166,.35), transparent 28%),
    linear-gradient(180deg, rgba(7,18,31,.88), rgba(7,18,31,.96));
  backdrop-filter: blur(16px);
  overflow: hidden;
}

.capture-overlay.is-visible {
  display: grid;
}

.capture-overlay::before {
  content: "";
  position: absolute;
  inset: -20%;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.08), transparent 18%),
    radial-gradient(circle at 80% 28%, rgba(255,255,255,.06), transparent 22%),
    radial-gradient(circle at 50% 90%, rgba(255,93,45,.14), transparent 30%);
  pointer-events: none;
}

/* INTRO ORB */

.capture-orb {
  position: absolute;
  width: 116px;
  height: 116px;
  border-radius: 50%;
  z-index: 3;
  background:
    radial-gradient(circle at 32% 25%, rgba(255,255,255,.95), rgba(255,255,255,.28) 22%, transparent 23%),
    radial-gradient(circle at 50% 70%, color-mix(in srgb, var(--rarity) 82%, white), var(--rarity));
  box-shadow:
    0 0 55px color-mix(in srgb, var(--rarity) 58%, transparent),
    inset 0 0 28px rgba(255,255,255,.55);
  display: grid;
  place-items: center;
  animation: orbSequence 1.55s cubic-bezier(.2,.9,.2,1) forwards;
}

.capture-orb::before,
.capture-orb::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  border: 1px solid color-mix(in srgb, var(--rarity) 55%, transparent);
  inset: -22px;
  animation: ringOut 1.2s ease-out infinite;
}

.capture-orb::after {
  inset: -42px;
  animation-delay: .18s;
}

.orb-mountain {
  width: 66px;
  height: 48px;
  position: relative;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,.2));
}

.orb-mountain::before {
  content: "";
  position: absolute;
  bottom: 0;
  left: 4px;
  width: 0;
  height: 0;
  border-left: 31px solid transparent;
  border-right: 31px solid transparent;
  border-bottom: 48px solid white;
}

.orb-mountain::after {
  content: "";
  position: absolute;
  bottom: 0;
  right: 0;
  width: 0;
  height: 0;
  border-left: 24px solid transparent;
  border-right: 24px solid transparent;
  border-bottom: 36px solid rgba(255,255,255,.72);
}

@keyframes ringOut {
  from { transform: scale(.75); opacity: .8; }
  to { transform: scale(1.35); opacity: 0; }
}

@keyframes orbSequence {
  0% { transform: scale(.25) translateY(30px); opacity: 0; }
  20% { transform: scale(1.08) translateY(0); opacity: 1; }
  38% { transform: translateX(-6px) rotate(-5deg); }
  50% { transform: translateX(6px) rotate(5deg); }
  62% { transform: translateX(-3px) rotate(-2deg); }
  75% { transform: translateX(0) rotate(0) scale(1); opacity: 1; }
  100% { transform: scale(2.6); opacity: 0; }
}

/* REVEAL CARD */

.reveal-wrap {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 390px;
  opacity: 0;
  transform: translateY(18px) scale(.92) rotateX(8deg);
  animation: cardReveal .7s cubic-bezier(.18,.9,.2,1) forwards 1.15s;
}

@keyframes cardReveal {
  to {
    opacity: 1;
    transform: translateY(0) scale(1) rotateX(0);
  }
}

.capture-card {
  position: relative;
  background: white;
  border-radius: 30px;
  padding: 10px;
  border: 3px solid color-mix(in srgb, var(--rarity) 42%, transparent);
  box-shadow:
    0 28px 80px rgba(0,0,0,.34),
    0 0 50px color-mix(in srgb, var(--rarity) 30%, transparent);
  overflow: hidden;
}

.capture-card::before {
  content: "";
  position: absolute;
  inset: -40%;
  background:
    linear-gradient(115deg, transparent 42%, rgba(255,255,255,.75) 50%, transparent 58%);
  transform: translateX(-60%) rotate(8deg);
  animation: cardShine 2.4s ease-in-out 1.5s infinite;
  pointer-events: none;
  z-index: 5;
}

@keyframes cardShine {
  0%, 40% { transform: translateX(-60%) rotate(8deg); opacity: 0; }
  55% { opacity: .8; }
  100% { transform: translateX(60%) rotate(8deg); opacity: 0; }
}

.capture-card.daisy {
  --rarity: var(--daisy);
  --rarity-soft: var(--daisy-soft);
}

.capture-card.gentian {
  --rarity: var(--gentian);
  --rarity-soft: var(--gentian-soft);
}

.capture-card.edelweiss {
  --rarity: var(--edelweiss);
  --rarity-soft: var(--edelweiss-soft);
}

.capture-card.saxifrage {
  --rarity: var(--saxifrage);
  --rarity-soft: var(--saxifrage-soft);
}

.capture-card.mythic {
  animation: mythicGlow 3s ease-in-out infinite;
}

@keyframes mythicGlow {
  0%,100% {
    box-shadow:
      0 28px 85px rgba(0,0,0,.34),
      0 0 46px rgba(234,179,8,.28);
  }
  50% {
    box-shadow:
      0 34px 100px rgba(0,0,0,.42),
      0 0 80px rgba(234,179,8,.52);
  }
}

.capture-frame {
  position: relative;
  border-radius: 23px;
  overflow: hidden;
  border: 1px solid rgba(13,37,56,.08);
  background: white;
}

.capture-topbar {
  height: 44px;
  padding: 0 13px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(13,37,56,.08);
  background: rgba(255,255,255,.88);
}

.capture-label {
  font-size: 10px;
  font-weight: 950;
  letter-spacing: .13em;
  text-transform: uppercase;
  color: var(--rarity);
}

.capture-id {
  font-size: 11px;
  color: #7C8794;
  font-weight: 800;
}

/* IMAGE AREA */

.capture-image {
  position: relative;
  margin: 10px;
  border-radius: 18px;
  height: 390px;
  overflow: hidden;
  background:
    linear-gradient(to top, rgba(7,18,31,.88), rgba(7,18,31,.36) 50%, transparent 78%),
    var(--image) center/cover;
}

.capture-image::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 32%, color-mix(in srgb, var(--rarity) 32%, transparent), transparent 28%);
}

.unlocked-badge {
  position: absolute;
  top: 13px;
  left: 13px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(255,255,255,.92);
  color: var(--rarity);
  border-radius: 999px;
  padding: 7px 11px;
  font-size: 10px;
  font-weight: 950;
  letter-spacing: .1em;
  text-transform: uppercase;
  box-shadow: 0 10px 24px rgba(0,0,0,.12);
}

.unlocked-badge span {
  width: 21px;
  height: 21px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: var(--rarity-soft);
  font-size: 13px;
}

.peak-copy {
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: 16px;
}

.capture-kicker {
  display: inline-block;
  color: rgba(255,255,255,.84);
  font-size: 10px;
  font-weight: 950;
  letter-spacing: .13em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.peak-name {
  color: white;
  font-size: 31px;
  line-height: .98;
  letter-spacing: -.05em;
  font-weight: 950;
  text-shadow: 0 3px 14px rgba(0,0,0,.45);
}

.peak-route {
  color: rgba(255,255,255,.86);
  font-size: 14px;
  font-weight: 700;
  margin-top: 8px;
  text-shadow: 0 2px 8px rgba(0,0,0,.45);
}

/* REWARD */

.reward-row {
  margin: 0 10px 10px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.reward-pill {
  background: #F8FAFC;
  border: 1px solid rgba(13,37,56,.08);
  border-radius: 16px;
  padding: 11px 10px;
  box-shadow: 0 7px 18px rgba(13,37,56,.06);
}

.reward-label {
  display: block;
  font-size: 9px;
  font-weight: 950;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #8A94A3;
  margin-bottom: 3px;
}

.reward-value {
  font-size: 18px;
  font-weight: 950;
  color: var(--dark);
}

.reward-value.ep {
  color: var(--orange);
}

.reward-value.crains {
  color: var(--rarity);
}

.capture-footer {
  padding: 3px 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.primary-button {
  border: 0;
  width: 100%;
  border-radius: 999px;
  padding: 15px 20px;
  background: var(--dark);
  color: white;
  font-size: 15px;
  font-weight: 950;
  cursor: pointer;
  box-shadow: 0 15px 34px rgba(13,37,56,.2);
}

.secondary-button {
  border: 0;
  background: transparent;
  color: #6B7280;
  font-size: 13px;
  font-weight: 850;
  cursor: pointer;
  padding: 4px;
}

/* PARTICLES */

.particle {
  position: absolute;
  z-index: 4;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--rarity);
  opacity: 0;
  animation: particleBurst 1.2s ease-out 1.1s forwards;
}

.p1 { top: 18%; left: 22%; --x: -42px; --y: -38px; }
.p2 { top: 20%; right: 20%; --x: 48px; --y: -34px; }
.p3 { top: 46%; left: 12%; --x: -54px; --y: 6px; }
.p4 { top: 50%; right: 12%; --x: 54px; --y: 8px; }
.p5 { bottom: 22%; left: 22%; --x: -44px; --y: 42px; }
.p6 { bottom: 20%; right: 22%; --x: 44px; --y: 44px; }

@keyframes particleBurst {
  0% { transform: translate(0,0) scale(.2); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
}

@media (max-width: 420px) {
  .capture-image { height: 370px; }
  .peak-name { font-size: 29px; }
}
</style>
</head>

<body>

<div class="demo">
  <div class="demo-card">
    <div class="demo-image">
      <h1>Tossa Plana<br>de Lles</h1>
    </div>
  </div>

  <button class="demo-button" onclick="showCaptureAnimation(exampleSummit)">
    Guardar ascensión
  </button>
</div>

<div class="capture-overlay gentian" id="captureOverlay">
  <div class="capture-orb">
    <div class="orb-mountain"></div>
  </div>

  <div class="reveal-wrap">
    <article class="capture-card gentian" id="captureCard">

      <span class="particle p1"></span>
      <span class="particle p2"></span>
      <span class="particle p3"></span>
      <span class="particle p4"></span>
      <span class="particle p5"></span>
      <span class="particle p6"></span>

      <div class="capture-frame">
        <div class="capture-topbar">
          <span class="capture-label">Peak Capture</span>
          <span class="capture-id" id="captureId">#023</span>
        </div>

        <div class="capture-image" id="captureImage">
          <div class="unlocked-badge">
            <span>✿</span>
            <strong id="captureRarity">Gentian unlocked</strong>
          </div>

          <div class="peak-copy">
            <span class="capture-kicker">Cima capturada</span>
            <h1 class="peak-name" id="captureName">Tossa Plana de Lles</h1>
            <p class="peak-route" id="captureRoute">Ruta circular desde Cap del Rec</p>
          </div>
        </div>

        <div class="reward-row">
          <div class="reward-pill">
            <span class="reward-label">Experiencia</span>
            <div class="reward-value ep" id="captureEp">+24 EP</div>
          </div>

          <div class="reward-pill">
            <span class="reward-label">Crains</span>
            <div class="reward-value crains" id="captureCrains">+35</div>
          </div>
        </div>

        <div class="capture-footer">
          <button class="primary-button" onclick="goToAscent()">Ver ascensión</button>
          <button class="secondary-button" onclick="closeCaptureAnimation()">Cerrar</button>
        </div>
      </div>
    </article>
  </div>
</div>

<script>
const exampleSummit = {
  id: "#023",
  name: "Tossa Plana de Lles",
  route: "Ruta circular desde Cap del Rec",
  rarity: "Gentian",
  rarityKey: "gentian",
  ep: 24,
  crains: 35,
  isMythic: false,
  image: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=900&q=85",
  ascentUrl: "#ascent-detail"
};

function showCaptureAnimation(summit) {
  const overlay = document.getElementById("captureOverlay");
  const card = document.getElementById("captureCard");
  const image = document.getElementById("captureImage");

  document.getElementById("captureId").textContent = summit.id || "#001";
  document.getElementById("captureName").textContent = summit.name;
  document.getElementById("captureRoute").textContent = summit.route || "Nueva ascensión registrada";
  document.getElementById("captureRarity").textContent = `${summit.rarity} unlocked`;
  document.getElementById("captureEp").textContent = `+${summit.ep} EP`;
  document.getElementById("captureCrains").textContent = `+${summit.crains}`;

  image.style.setProperty("--image", `url("${summit.image}")`);

  overlay.className = "capture-overlay is-visible " + summit.rarityKey;
  card.className = "capture-card " + summit.rarityKey;

  if (summit.isMythic) {
    card.classList.add("mythic");
  }

  window.currentAscentUrl = summit.ascentUrl;

  void overlay.offsetWidth;
}

function closeCaptureAnimation() {
  document.getElementById("captureOverlay").classList.remove("is-visible");
}

function goToAscent() {
  window.location.href = window.currentAscentUrl || "#";
}
